name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate repository structure
        run: |
          echo "Repository validated"
          find . -name "*.cs" -o -name "*.vb" -o -name "*.aspx" | wc -l
          echo "source files found"
